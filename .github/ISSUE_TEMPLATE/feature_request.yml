name: Feature Request
description: Suggest a new feature or detector
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      options:
        - New detector
        - CLI improvement
        - Output format
        - Integration
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why is this needed? What problem does it solve?
    validations:
      required: true
